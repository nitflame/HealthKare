<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ✅ Custom favicon -->
    <link rel="icon" type="image/png" href="/logo2.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ✅ Page Title -->
    <title>Nitin Health Records</title>

    <style>
      /* 🌟 Splash Screen */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.8s ease;
        font-family: "Inter", Arial, sans-serif;
        color: #111827;
      }

      #splash-screen img {
        width: 100px;
        margin-bottom: 40px;
      }

      /* 🌟 Loader */
      .loader {
        width: 60px;
        aspect-ratio: 4;
        --_g: no-repeat radial-gradient(circle closest-side, #2563eb 90%, #0000);
        background: var(--_g) 0% 50%, var(--_g) 50% 50%, var(--_g) 100% 50%;
        background-size: calc(100% / 3) 100%;
        animation: dots 1s infinite linear;
      }

      @keyframes dots {
        33% {
          background-size: calc(100% / 3) 0%, calc(100% / 3) 100%,
            calc(100% / 3) 100%;
        }
        50% {
          background-size: calc(100% / 3) 100%, calc(100% / 3) 0%,
            calc(100% / 3) 100%;
        }
        66% {
          background-size: calc(100% / 3) 100%, calc(100% / 3) 100%,
            calc(100% / 3) 0%;
        }
      }

      /* 🌟 Footer text */
      .splash-footer {
        position: absolute;
        bottom: 30px;
        font-size: 14px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <!-- ✅ Splash Screen -->
    <div id="splash-screen">
      <img src="logo2.png" alt="Loading..." />
      <div class="loader"></div>
      <p class="splash-footer">&copy; 2026 Nitin Health. All rights reserved.</p>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>


    <script>
  // ❌ remove this auto timer
  window.addEventListener("load", () => {
    const splash = document.getElementById("splash-screen");
    setTimeout(() => {
      splash.style.opacity = "0";
      setTimeout(() => (splash.style.display = "none"), 1000);
    }, 900);
  });
</script>

  </body>
</html>
